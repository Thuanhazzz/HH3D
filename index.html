<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HH3D Tool – Tải xuống</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 32px 24px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #f0f6fc; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #8b949e; margin-bottom: 24px; }
    .version-badge {
      display: inline-block;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      color: #79c0ff;
      margin-bottom: 24px;
    }
    .btn-download {
      display: inline-block;
      background: #238636;
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      max-width: 300px;
    }
    .btn-download:hover { background: #2ea043; }
    .btn-download:active { background: #1a7f37; }
    .btn-download.disabled {
      background: #21262d;
      color: #8b949e;
      cursor: default;
    }
    .changelog {
      margin-top: 24px;
      font-size: 13px;
      color: #8b949e;
      line-height: 1.6;
    }
    .changelog a {
      color: #58a6ff;
      text-decoration: none;
    }
    .error { color: #f85149; font-size: 14px; margin-top: 12px; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎮</div>
    <h1>HH3D Tool</h1>
    <p class="subtitle">Công cụ tự động cho Hoạt Hình 3D</p>

    <div id="content">
      <div class="spinner"></div>
    </div>

    <div class="changelog">
      <a href="https://github.com/Thuanhazzz/HH3D/releases" target="_blank">
        Xem tất cả phiên bản &rarr;
      </a>
    </div>
  </div>

  <script>
    var VERSIONS_URL = "https://raw.githubusercontent.com/Thuanhazzz/HH3D/main/versions.json";

    function getLatestVersion(versions) {
      var keys = Object.keys(versions);
      if (keys.length === 0) return null;
      keys.sort(function (a, b) {
        var pa = a.split(".").map(Number);
        var pb = b.split(".").map(Number);
        var len = Math.max(pa.length, pb.length);
        for (var i = 0; i < len; i++) {
          if ((pa[i] || 0) !== (pb[i] || 0)) return (pa[i] || 0) - (pb[i] || 0);
        }
        return 0;
      });
      return versions[keys[keys.length - 1]];
    }

    function sanitizeVersion(v) {
      return String(v).replace(/[^0-9.]/g, "").slice(0, 20);
    }

    function isValidDownloadUrl(url) {
      return typeof url === "string" &&
        url.indexOf("https://github.com/Thuanhazzz/HH3D/releases/download/") === 0;
    }

    function render(latest) {
      var el = document.getElementById("content");
      if (!latest) {
        el.innerHTML = '<p class="error">Không tìm thấy phiên bản nào.</p>';
        return;
      }
      var safeVersion = sanitizeVersion(latest.version);
      if (!isValidDownloadUrl(latest.url)) {
        el.innerHTML = '<p class="error">Đường dẫn tải xuống không hợp lệ.</p>';
        return;
      }
      el.innerHTML =
        '<div class="version-badge">Phiên bản mới nhất: v' + safeVersion + "</div><br/>" +
        '<a class="btn-download" href="' + latest.url + '" download>⬇ Tải xuống v' + safeVersion + "</a>";
    }

    var xhr = new XMLHttpRequest();
    xhr.open("GET", VERSIONS_URL + "?t=" + Date.now(), true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) return;
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          render(getLatestVersion(data));
        } catch (e) {
          document.getElementById("content").innerHTML =
            '<p class="error">Lỗi khi đọc dữ liệu phiên bản.</p>';
        }
      } else {
        document.getElementById("content").innerHTML =
          '<p class="error">Không thể tải danh sách phiên bản (lỗi ' + xhr.status + ').</p>';
      }
    };
    xhr.send();
  </script>
</body>
</html>
